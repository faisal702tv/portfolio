services:
  portfolio:
    build: .
    user: "0:0"
    restart: unless-stopped
    init: true
    ports:
      - "3333:3333"
    networks:
      - default
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=coolify"
      - "traefik.http.services.portfolio.loadbalancer.server.port=3333"
      - "traefik.http.routers.portfolio-http.rule=Host(`isthmar.cloud`) || Host(`www.isthmar.cloud`)"
      - "traefik.http.routers.portfolio-http.entrypoints=http"
      - "traefik.http.routers.portfolio-http.middlewares=portfolio-https-redirect"
      - "traefik.http.middlewares.portfolio-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.routers.portfolio-https.rule=Host(`isthmar.cloud`) || Host(`www.isthmar.cloud`)"
      - "traefik.http.routers.portfolio-https.entrypoints=https"
      - "traefik.http.routers.portfolio-https.tls=true"
      - "traefik.http.routers.portfolio-https.tls.certresolver=letsencrypt"
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DOCKER_DATABASE_URL:-file:/app/data/portfolio.db}
      JWT_SECRET: ${JWT_SECRET}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3333}
    volumes:
      - portfolio-data:/app/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"const http=require('http');const req=http.get('http://127.0.0.1:3333/api',res=>process.exit(res.statusCode>=200&&res.statusCode<400?0:1));req.on('error',()=>process.exit(1));req.setTimeout(5000,()=>{req.destroy();process.exit(1);});\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 45s

volumes:
  portfolio-data:

networks:
  coolify:
    external: true
