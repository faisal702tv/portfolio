services:
  portfolio:
    build: .
    container_name: portfolio
    restart: unless-stopped
    init: true
    ports:
      - "3333:3333"
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DOCKER_DATABASE_URL:-file:/app/data/portfolio.db}
      JWT_SECRET: ${JWT_SECRET}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3333}
    volumes:
      - portfolio-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3333/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  # Optional: Caddy reverse proxy with auto-HTTPS
  caddy:
    image: caddy:2-alpine
    container_name: portfolio-caddy
    restart: unless-stopped
    init: true
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-localhost}
      ACME_EMAIL: ${ACME_EMAIL:-admin@localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      portfolio:
        condition: service_healthy

volumes:
  portfolio-data:
  caddy-data:
  caddy-config:
