services:
  portfolio:
    build: .
    container_name: portfolio
    user: "0:0"
    restart: unless-stopped
    init: true
    ports:
      - "3333:3333"
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DOCKER_DATABASE_URL:-file:/app/data/portfolio.db}
      JWT_SECRET: ${JWT_SECRET}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3333}
    volumes:
      - portfolio-data:/app/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"const http=require('http');const req=http.get('http://127.0.0.1:3333/api',res=>process.exit(res.statusCode>=200&&res.statusCode<400?0:1));req.on('error',()=>process.exit(1));req.setTimeout(5000,()=>{req.destroy();process.exit(1);});\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 45s

  # Optional: Caddy reverse proxy with auto-HTTPS
  caddy:
    image: caddy:2-alpine
    container_name: portfolio-caddy
    restart: unless-stopped
    init: true
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-localhost}
      ACME_EMAIL: ${ACME_EMAIL:-admin@localhost}
    command:
      - /bin/sh
      - -c
      - |
        cat >/etc/caddy/Caddyfile <<EOF
        {
          email $$ACME_EMAIL
        }
        $$DOMAIN {
          encode zstd gzip
          reverse_proxy portfolio:3333
        }
        :80 {
          encode zstd gzip
          reverse_proxy portfolio:3333
        }
        EOF
        exec caddy run --config /etc/caddy/Caddyfile --adapter caddyfile
    volumes:
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      portfolio:
        condition: service_healthy

volumes:
  portfolio-data:
  caddy-data:
  caddy-config:
